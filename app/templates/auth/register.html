{% extends "base.html" %}

{% block title %}註冊帳號{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="glass-panel p-5 text-center shadow-lg border-secondary">
            <!-- 頂級 Logo 區 -->
            <div class="mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 70px; height: 70px; background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(5, 150, 105, 0.2) 100%); border: 1px solid rgba(255, 255, 255, 0.1);">
                    <i class="bi bi-person-plus-fill fs-2 text-success"></i>
                </div>
                <h2 class="fw-bold text-white mb-1" style="font-family: 'Outfit', sans-serif;">建立帳號</h2>
                <p class="text-white-50 small">註冊以享受獨立的資料備份與盈虧分析統計</p>
            </div>
            
            <!-- 註冊表單 -->
            <form action="{{ url_for('auth.register') }}" method="POST" class="text-start">
                <div class="mb-3">
                    <label for="username" class="form-label text-white-50 small"><i class="bi bi-person me-1"></i>使用者名稱</label>
                    <input type="text" class="form-control rounded-3 py-2 text-white bg-dark border-secondary" id="username" name="username" placeholder="請設定 3~20 字的帳號" required minlength="3" maxlength="20" style="background: rgba(0,0,0,0.2) !important;">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label text-white-50 small"><i class="bi bi-key me-1"></i>密碼</label>
                    <input type="password" class="form-control rounded-3 py-2 text-white bg-dark border-secondary" id="password" name="password" placeholder="請輸入密碼" required minlength="6" style="background: rgba(0,0,0,0.2) !important;">
                </div>
                <div class="mb-4">
                    <label for="confirm_password" class="form-label text-white-50 small"><i class="bi bi-key-fill me-1"></i>確認密碼</label>
                    <input type="password" class="form-control rounded-3 py-2 text-white bg-dark border-secondary" id="confirm_password" name="confirm_password" placeholder="請再次輸入密碼" required minlength="6" style="background: rgba(0,0,0,0.2) !important;">
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg rounded-pill hover-glow border-0 py-2.5" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                        <i class="bi bi-person-plus me-2"></i>註冊新會員
                    </button>
                </div>
            </form>
            
            <div class="mt-4 pt-3 border-top border-secondary">
                <p class="text-white-50 small mb-0">已經有帳號了嗎？ 
                    <a href="{{ url_for('auth.login') }}" class="text-success text-decoration-none fw-bold hover-underline">立即登入 <i class="bi bi-arrow-right-short"></i></a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
