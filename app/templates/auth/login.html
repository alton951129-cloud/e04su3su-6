{% extends "base.html" %}

{% block title %}登入帳號{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="glass-panel p-5 text-center shadow-lg border-secondary">
            <!-- 頂級 Logo 區 -->
            <div class="mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 70px; height: 70px; background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(168, 85, 247, 0.2) 100%); border: 1px solid rgba(255, 255, 255, 0.1);">
                    <i class="bi bi-shield-lock-fill fs-2 text-info"></i>
                </div>
                <h2 class="fw-bold text-white mb-1" style="font-family: 'Outfit', sans-serif;">會員登入</h2>
                <p class="text-white-50 small">請登入您的帳戶以存取個人記帳數據</p>
            </div>
            
            <!-- 登入表單 -->
            <form action="{{ url_for('auth.login') }}" method="POST" class="text-start">
                <div class="mb-3">
                    <label for="username" class="form-label text-white-50 small"><i class="bi bi-person me-1"></i>使用者名稱</label>
                    <input type="text" class="form-control rounded-3 py-2 text-white bg-dark border-secondary" id="username" name="username" placeholder="請輸入帳號" required style="background: rgba(0,0,0,0.2) !important;">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-white-50 small"><i class="bi bi-key me-1"></i>密碼</label>
                    <input type="password" class="form-control rounded-3 py-2 text-white bg-dark border-secondary" id="password" name="password" placeholder="請輸入密碼" required style="background: rgba(0,0,0,0.2) !important;">
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill hover-glow border-0 py-2.5" style="background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);">
                        <i class="bi bi-box-arrow-in-right me-2"></i>登入系統
                    </button>
                </div>
            </form>
            
            <div class="mt-4 pt-3 border-top border-secondary">
                <p class="text-white-50 small mb-0">還沒有帳號嗎？ 
                    <a href="{{ url_for('auth.register') }}" class="text-info text-decoration-none fw-bold hover-underline">立即註冊 <i class="bi bi-arrow-right-short"></i></a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
